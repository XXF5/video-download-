name: Smart Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Verify project structure
      run: |
        if [ ! -f "settings.gradle.kts" ] && [ ! -f "settings.gradle" ]; then
          echo "::error ::No settings.gradle(.kts) found in root! Cannot build APK."
          exit 1
        fi
        if [ ! -d "app" ]; then
          echo "::error ::No app/ directory found! Cannot build APK."
          exit 1
        fi
        if [ ! -f "app/build.gradle.kts" ] && [ ! -f "app/build.gradle" ]; then
          echo "::error ::No app/build.gradle(.kts) found! Cannot build APK."
          exit 1
        fi

    - name: Use Gradle wrapper if exists, else system Gradle
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          echo "Using gradlew wrapper"
          ./gradlew :app:assembleDebug --stacktrace
        else
          echo "Gradlew not found, using system Gradle"
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle :app:assembleDebug --stacktrace
        fi

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
